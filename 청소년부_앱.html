<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>청소년부 목양 매니저</title>
    <!-- Tailwind CSS 및 FontAwesome 아이콘 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased pb-12">

    <!-- 상단 헤더 영역 -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white px-4 pt-5 pb-5 rounded-b-2xl shadow-md sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <span class="text-xs font-bold bg-blue-500/50 px-2 py-0.5 rounded-full uppercase tracking-wider text-blue-100">Church Manager</span>
                <h1 class="text-xl font-black tracking-tight mt-0.5 flex items-center gap-2">
                    <i class="fa-solid fa-church text-amber-300 text-lg"></i> 청소년부 목양 앱
                </h1>
            </div>
            <button onclick="toggleSetupModal()" class="w-9 h-9 flex items-center justify-center bg-white/10 hover:bg-white/20 active:scale-95 transition rounded-xl text-white">
                <i class="fa-solid fa-gear text-lg"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-4">
        
        <!-- [학사일정 탭 연동] 기간제 학사 및 사역 일정 섹션 -->
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-calendar-days text-amber-500"></i> 주요 학사 및 사역 일정
            </h2>
            <div id="calendarScheduleBox" class="space-y-2 max-h-36 overflow-y-auto no-scrollbar">
                <p class="text-xs text-slate-400 text-center py-2">일정을 불러오는 중입니다...</p>
            </div>
        </section>

        <!-- [학생명단 탭 연동] 목양 반 선택 탭 -->
        <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-users text-blue-500"></i> 목양 반 선택
            </h2>
            <div id="classTabs" class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <div class="animate-pulse bg-slate-200 h-9 w-20 rounded-xl"></div>
            </div>
        </section>

        <!-- [기도제목 탭 연동] AI 주간 목양 리포트 브리핑 -->
        <section class="bg-gradient-to-br from-indigo-900 to-slate-900 text-white p-5 rounded-2xl shadow-lg border border-indigo-950 relative overflow-hidden">
            <div class="absolute -right-6 -bottom-6 text-white/5 text-8xl pointer-events-none">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="flex justify-between items-start mb-3">
                <h2 class="text-xs font-bold text-indigo-300 uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-wand-magic-sparkles text-amber-400"></i> Gemini AI 목양 분석 브리핑
                </h2>
                <span id="reportTarget" class="text-xs bg-indigo-500/30 text-indigo-200 px-2 py-0.5 rounded-md font-medium">선택 대기 중</span>
            </div>
            <div id="aiReportBox" class="text-sm leading-relaxed min-h-[80px] flex flex-col justify-center">
                <p class="text-slate-400 text-center py-4"><i class="fa-solid fa-circle-info mr-1"></i> 반을 선택하면 AI가 시트의 기도제목을 분석합니다.</p>
            </div>
        </section>

        <!-- [통합 리스트] 학생 명단 및 출석 현황 / 기도제목 카드 -->
        <section class="space-y-3">
            <h2 class="text-xs font-bold text-slate-400 px-1 uppercase tracking-wider flex items-center gap-1.5">
                <i class="fa-solid fa-address-book text-indigo-500"></i> 학생 관리 리스트 (<span id="studentCount">0</span>명)
            </h2>
            <div id="studentContainer" class="space-y-3">
                <!-- 학생 카드 리스트가 동적으로 꽂히는 공간 -->
            </div>
        </section>
    </main>

    <!-- 구글 웹앱 주소 설정 변경 모달 창 -->
    <div id="setupModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center p-4 hidden" onclick="toggleSetupModal()">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden transition-all transform" onclick="event.stopPropagation()">
            <div class="px-5 pt-5 pb-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-link text-blue-600"></i> 구글 시스템 연동 설정</h3>
                <button onclick="toggleSetupModal()" class="w-7 h-7 flex items-center justify-center rounded-full bg-slate-200 text-slate-500 hover:bg-slate-300 text-sm"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">구글 Apps Script 웹 앱 URL</label>
                    <input type="text" id="webAppUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                    <p class="text-[11px] text-slate-400 mt-1.5 leading-normal"><i class="fa-solid fa-circle-info mr-0.5"></i> 새 배포로 발급된 웹앱 주소를 정확히 넣어주세요.</p>
                </div>
                <button onclick="saveWebAppUrl()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm shadow-md">
                    설정 저장 및 시스템 동기화
                </button>
            </div>
        </div>
    </div>

    <!-- 통신 로딩 스피너 오버레이 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3">
            <div class="w-5 h-5 border-3 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-sm font-semibold text-slate-700">구글 서버 데이터 동기화 중...</span>
        </div>
    </div>

    <!-- 프론트엔드 핵심 제어 로직 스크립트 -->
    <script>
        let webAppUrl = localStorage.getItem('CHURCH_WEB_APP_URL') || '';
        let currentClass = '';
        let serverData = null;

        window.addEventListener('DOMContentLoaded', () => {
            if (!webAppUrl) { toggleSetupModal(); } else { fetchInitialData(); }
        });

        function showLoading(show) { document.getElementById('loadingOverlay').classList.toggle('hidden', !show); }
        
        function toggleSetupModal() {
            const modal = document.getElementById('setupModal');
            document.getElementById('webAppUrlInput').value = webAppUrl;
            modal.classList.toggle('hidden');
        }

        function saveWebAppUrl() {
            let inputUrl = document.getElementById('webAppUrlInput').value.trim();
            if(!inputUrl) return alert('연동할 구글 웹 앱 주소를 넣어주세요.');
            localStorage.setItem('CHURCH_WEB_APP_URL', inputUrl);
            webAppUrl = inputUrl;
            toggleSetupModal();
            fetchInitialData();
        }

        // 구글 백엔드로부터 데이터 수집 원격 호출
        async function fetchInitialData() {
            if (!webAppUrl) return;
            showLoading(true);
            try {
                const response = await fetch(webAppUrl + '?action=getInitialData');
                const result = await response.json();
                if(result.status === 'success') {
                    serverData = result.data;
                    renderClassTabs(result.data.classes);
                    renderSchedules(result.data.schedules); 
                } else {
                    alert('데이터 로드 실패: ' + result.message);
                }
            } catch (error) {
                alert('구글 서버와 통신할 수 없습니다. 주소 및 권한 설정을 점검해 주세요.');
            } finally { showLoading(false); }
        }

        // 기간 학사 일정을 최상단에 뿌려주는 기능
        function renderSchedules(schedules) {
            const box = document.getElementById('calendarScheduleBox');
            if(!schedules || schedules.length === 0) {
                box.innerHTML = '<p class="text-xs text-slate-400 text-center py-2"><i class="fa-solid fa-info-circle mr-1"></i> 현재 등록된 주요 일정이 없습니다.</p>';
                return;
            }
            
            box.innerHTML = schedules.map(sch => {
                const dateDisplay = sch.start === sch.end 
                    ? `<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[11px] font-bold font-mono">${sch.start}</span>`
                    : `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[11px] font-bold font-mono">${sch.start} ~ ${sch.end}</span>`;
                
                return `
                    <div class="flex items-center justify-between p-2.5 bg-slate-50 rounded-xl border border-slate-100 text-xs">
                        <span class="font-bold text-slate-700 flex items-center gap-1.5"><i class="fa-regular fa-bell text-amber-500"></i> ${sch.content}</span>
                        ${dateDisplay}
                    </div>
                `;
            }).join('');
        }

        function renderClassTabs(classes) {
            const container = document.getElementById('classTabs');
            container.innerHTML = classes.map((className, idx) => {
                const isSelected = currentClass === className || (!currentClass && idx === 0);
                if(isSelected && !currentClass) currentClass = className;
                return `<button onclick="selectClass('${className}')" class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition active:scale-95 ${isSelected ? 'bg-blue-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">${className}</button>`;
            }).join('');
            if(currentClass) selectClass(currentClass);
        }

        // 반 선택 시 학생 명단 + [출석배지] + [기도제목] 융합 카드 출력
        function selectClass(className) {
            currentClass = className;
            renderClassTabs(serverData.classes);
            document.getElementById('reportTarget').innerText = className;
            
            const students = serverData.students.filter(s => s.grade === className);
            document.getElementById('studentCount').innerText = students.length;
            
            const container = document.getElementById('studentContainer');
            if(students.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-xs text-slate-400 bg-white rounded-2xl border border-dashed">이 반에 소속된 학생이 없습니다.</div>';
                return;
            }
            
            container.innerHTML = students.map(student => {
                const prayers = serverData.prayers.filter(p => p.name === student.name);
                
                // 출석 상태별 배지 색상 지정 로직
                let attBadgeColor = "bg-slate-100 text-slate-500";
                if(student.attStatus === "출석") attBadgeColor = "bg-emerald-100 text-emerald-700 font-extrabold";
                if(student.attStatus === "결석") attBadgeColor = "bg-rose-100 text-rose-700 font-extrabold";
                if(student.attStatus === "지각") attBadgeColor = "bg-amber-100 text-amber-700 font-extrabold";

                let prayerHtml = prayers.map(p => `
                    <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-xs text-slate-700 relative mt-1">
                        <span class="absolute right-2 top-2 text-[9px] font-mono text-slate-400">${p.date}</span>
                        <div class="font-bold text-slate-400 mb-0.5 flex items-center gap-1"><i class="fa-solid fa-heart text-rose-400 text-[10px]"></i> 기도제목</div>
                        <p class="pr-12 leading-relaxed">${p.content}</p>
                    </div>
                `).join('');
                
                return `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center font-bold text-sm text-blue-600">${student.name[0]}</div>
                                <span class="font-bold text-slate-800 text-base">${student.name}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-slate-400 block font-mono mb-0.5">${student.attDate ? student.attDate + ' 기준' : ''}</span>
                                <span class="px-2.5 py-1 rounded-lg text-xs ${attBadgeColor}">${student.attStatus}</span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            ${prayerHtml || '<p class="text-xs text-slate-300 italic text-center py-2">최근 누적된 기도제목 사역 기록이 없습니다.</p>'}
                        </div>
                    </div>
                `;
            }).join('');
            
            fetchAiReport(className);
        }

        // Gemini AI 리포트 브리핑 수집 호출
        async function fetchAiReport(className) {
            const reportBox = document.getElementById('aiReportBox');
            reportBox.innerHTML = '<div class="flex items-center justify-center py-3 gap-2"><div class="w-4 h-4 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin"></div><p class="text-xs text-indigo-300 animate-pulse">Gemini AI 목양 분석 진행 중...</p></div>';
            try {
                const response = await fetch(`${webAppUrl}?action=getAiReport&className=${encodeURIComponent(className)}`);
                const result = await response.json();
                if(result.status === 'success') {
                    reportBox.innerHTML = `<div class="text-xs md:text-sm text-indigo-100 font-medium leading-relaxed">${result.report.replace(/\n/g, '<br>')}</div>`;
                } else { reportBox.innerHTML = `<p class="text-rose-300 text-xs text-center">📊 분석 요약 리포트를 불러오지 못했습니다.</p>`; }
            } catch (error) { reportBox.innerHTML = `<p class="text-rose-300 text-xs text-center">구글 통신 이상으로 리포트 생성 실패</p>`; }
        }
    </script>
</body>
</html>
