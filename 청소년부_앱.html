<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- 모바일 앱처럼 보이게 하는 테마 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2b579a">
    <title>청소년부 담임별 출석 및 기도제목 시스템</title>
    <!-- manifest 파일 연결 (스마트폰이 앱으로 인식함) -->
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 10px; color: #333; margin: 0; }
        .box { max-width: 100%; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }
        header { text-align: center; margin-bottom: 15px; background: #2b579a; color: white; padding: 12px; border-radius: 8px; }
        
        .reset-box { margin: 10px 0; padding: 8px; background-color: #fee2e2; border: 1px dashed #ef4444; border-radius: 8px; text-align: center; }
        .mega-btn { background-color: #ef4444; color: white; font-size: 13px; font-weight: bold; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; width: 100%; display: block; }

        .panel { border: 1px solid #ccc; padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #fafafa; }
        .counsel-card { border-left: 5px solid #ef4444; background: #fff5f5; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        
        .class-selector { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .class-btn { flex: 0 0 auto; min-width: 85px; padding: 10px 10px; background: #e0e0e0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .class-btn.active { background: #2b579a; color: white; box-shadow: 0 3px 6px rgba(43,87,154,0.3); }

        .student-item { display: flex; flex-direction: column; padding: 12px 5px; border-bottom: 1px solid #eee; gap: 6px; }
        .student-top { display: flex; justify-content: space-between; align-items: center; }
        
        .input-field { width: 100%; padding: 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; outline: none; margin-top: 4px; display: block; box-sizing: border-box; }
        .reason-input { border-color: #e67e22; background-color: #fffaf0; }
        .pray-input { border-color: #3498db; background-color: #f0f8ff; }
        
        .btn-save { background: #2ecc71; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 6px rgba(46,204,113,0.2); }
        .switch { position: relative; display: inline-block; width: 60px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e74c3c; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(32px); }
        .hidden { display: none !important; }
        .loading { text-align: center; font-weight: bold; color: #2b579a; padding: 20px; }
        .input-label { font-size: 11px; font-weight: bold; color: #666; margin-top: 3px; display: inline-block; }
        
        /* 앱 설치 안내 바 */
        #install-prompt { background: #e0f2fe; border: 1px solid #7dd3fc; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: center; font-size: 13px; font-weight: bold; color: #0369a1; }
    </style>
</head>
<body>

<div class="box">
    <!-- 앱 설치 안내바 (조건 충족 시 모바일에서만 노출됨) -->
    <div id="install-prompt" class="hidden">
        📱 스마트폰 바탕화면에 앱 아이콘 추가하기
        <button onclick="triggerInstall()" style="margin-left:10px; padding:5px 10px; background:#0284c7; color:white; border:none; border-radius:4px; font-size:12px; font-weight:bold;">설치</button>
    </div>

    <header>
        <h2>⛪ 청소년부 모바일 출석부</h2>
        <p style="font-size:11px; margin-top:5px; opacity:0.8;">스마트폰 홈화면 최적화 앱 버전</p>
    </header>

    <div class="reset-box">
        <button class="mega-btn" onclick="forceReset()">⚙️ 구글 주소 재연동하기</button>
    </div>

    <div id="url-panel" class="panel">
        <label style="font-size:11px; font-weight:bold; color:#555;">🔗 구글 웹앱 URL 입력</label>
        <div style="display:flex; gap:8px; margin-top:5px;">
            <input type="text" id="input-url" placeholder="주소 붙여넣기" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;">
            <button onclick="saveUrl()" style="padding:10px 15px; background:#2b579a; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; white-space:nowrap;">연결</button>
        </div>
    </div>

    <div id="loading-txt" class="loading hidden">🔄 시트 데이터 로딩 중...</div>

    <div id="app-content" class="hidden">
        <p style="font-size:11px; font-weight:bold; margin-bottom:5px; color:#555;">👤 담임 선생님 선택</p>
        <div class="class-selector" id="class-selector-box"></div>

        <div class="counsel-card">
            <h4 style="color:#b91c1c; margin:0 0 6px 0; font-size:14px;">📢 이번 주 전화심방 추천 (<span id="counsel-class-title">선생님</span>)</h4>
            <div id="counsel-box" style="font-size:12px; line-height:1.5;"></div>
        </div>

        <div class="panel">
            <label style="font-size:11px; font-weight:bold;">예배/행사 날짜</label>
            <input type="date" id="select-date" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        </div>

        <div class="panel" style="max-height: 350px; overflow-y: auto; padding: 5px 10px;">
            <div id="student-container"></div>
        </div>

        <button class="btn-save" id="save-btn-txt" onclick="sendToGoogle()">☁️ 결과 구글시트 저장</button>
    </div>
</div>

<script>
    // 서비스 워커 등록 (PWA 핵심 인프라)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("서비스 워커 등록 성공!"))
        .catch(err => console.log("서비스 워커 오류:", err));
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-prompt').classList.remove('hidden');
    });

    function triggerInstall() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    document.getElementById('install-prompt').classList.add('hidden');
                }
                deferredPrompt = null;
            });
        }
    }

    let API_URL = "";
    let allStudents = [];
    let filteredStudents = [];
    let history = {};
    let currentTeacher = "";

    window.onload = function() {
        document.getElementById('select-date').value = new Date().toISOString().split('T')[0];
        const saved = localStorage.getItem('ts_attendance_url');
        if (saved) {
            API_URL = saved;
            document.getElementById('input-url').value = saved;
            document.getElementById('url-panel').classList.add('hidden');
            loadData();
        }
    };

    function forceReset() {
        localStorage.removeItem('ts_attendance_url');
        API_URL = "";
        document.getElementById('input-url').value = "";
        document.getElementById('url-panel').classList.remove('hidden');
        document.getElementById('app-content').classList.add('hidden');
        alert("주소가 리셋되었습니다.");
    }

    function saveUrl() {
        const val = document.getElementById('input-url').value.trim();
        if (!val) { alert("구글 주소를 입력해주세요!"); return; }
        API_URL = val;
        localStorage.setItem('ts_attendance_url', val);
        document.getElementById('url-panel').classList.add('hidden');
        loadData();
    }

    function loadData() {
        document.getElementById('loading-txt').classList.remove('hidden');
        fetch(API_URL)
        .then(res => res.json())
        .then(resData => {
            document.getElementById('loading-txt').classList.add('hidden');
            if (resData.status === "success") {
                allStudents = resData.students;
                history = resData.history || {};
                const teachers = [...new Set(allStudents.map(s => s.grade))].sort();
                const btnBox = document.getElementById('class-selector-box');
                btnBox.innerHTML = "";
                teachers.forEach((tName, i) => {
                    const activeClass = i === 0 ? "active" : "";
                    if(i === 0) currentTeacher = tName; 
                    btnBox.innerHTML += `<button class="class-btn ${activeClass}" id="btn-tea-${i}" onclick="selectTeacher('${tName}', ${i})">${tName} 쌤</button>`;
                });
                changeTeacherView();
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                alert("실패: " + resData.message);
                forceReset();
            }
        })
        .catch(err => {
            document.getElementById('loading-txt').classList.add('hidden');
            alert("연결 오류!");
            forceReset();
        });
    }

    function selectTeacher(tName, btnIdx) {
        currentTeacher = tName;
        document.querySelectorAll('.class-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-tea-${btnIdx}`).classList.add('active');
        changeTeacherView();
    }

    function changeTeacherView() {
        filteredStudents = allStudents.filter(s => s.grade === currentTeacher);
        document.getElementById('counsel-class-title').innerText = currentTeacher;
        document.getElementById('save-btn-txt').innerText = `☁️ [${currentTeacher} 쌤] 결과 저장`;
        buildList();
        buildCounsel();
    }

    function buildList() {
        const con = document.getElementById('student-container');
        con.innerHTML = "";
        if(filteredStudents.length === 0) {
            con.innerHTML = "<div style='text-align:center; padding:20px; color:#999;'>학생이 없습니다.</div>";
            return;
        }
        filteredStudents.forEach((s, index) => {
            con.innerHTML += `
                <div class="student-item">
                    <div class="student-top">
                        <div><strong>${s.name}</strong></div>
                        <div>
                            <label class="switch">
                                <input type="checkbox" class="chk" data-name="${s.name}" id="chk-${index}" onchange="toggleReason(${index})">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="reason-box-${index}">
                        <span class="input-label">🔸 결석 사유</span>
                        <input type="text" class="input-field reason-input" id="reason-${index}" placeholder="학원, 아픔 등">
                    </div>
                    <div>
                        <span class="input-label">🔹 이번 주 기도제목</span>
                        <input type="text" class="input-field pray-input" id="pray-${index}" placeholder="기도제목 입력">
                    </div>
                </div>`;
        });
    }

    function toggleReason(index) {
        const chk = document.getElementById(`chk-${index}`);
        const reasonBox = document.getElementById(`reason-box-${index}`);
        const reasonInput = document.getElementById(`reason-${index}`);
        if (chk.checked) {
            reasonBox.style.opacity = "0.3";
            reasonInput.disabled = true;
            reasonInput.value = ""; 
        } else {
            reasonBox.style.opacity = "1";
            reasonInput.disabled = false;
        }
    }

    function buildCounsel() {
        const box = document.getElementById('counsel-box');
        box.innerHTML = "";
        let count = 0;
        filteredStudents.forEach(s => {
            const h = history[s.name] || [];
            if (h.length === 0) return;
            const len = h.length;
            if (len >= 3 && !h[len-1] && !h[len-2] && !h[len-3]) {
                count++;
                box.innerHTML += `<div style="color:#b91c1c; margin-bottom:4px;">🔴 <strong>${s.name}</strong>: 3주 결석! 심방 필수!</div>`;
            } else if (len >= 2 && !h[len-1] && !h[len-2]) {
                count++;
                box.innerHTML += `<div style="color:#c2410c; margin-bottom:4px;">🟠 <strong>${s.name}</strong>: 2주 연속 결석.</div>`;
            }
        });
        if (count === 0) box.innerHTML = `<div style='color:#1e3a8a; text-align:center;'>🎉 특별 관리 대상자가 없습니다!</div>`;
    }

    function sendToGoogle() {
        const dVal = document.getElementById('select-date').value;
        const present = []; const absent = []; const reasons = {}; const prays = {};
        document.querySelectorAll('.chk').forEach(c => {
            const name = c.getAttribute('data-name');
            if (c.checked) present.push(name); else absent.push(name);
        });
        filteredStudents.forEach((s, index) => {
            const chk = document.getElementById(`chk-${index}`);
            if (!chk.checked) reasons[s.name] = document.getElementById(`reason-${index}`).value.trim();
            const pVal = document.getElementById(`pray-${index}`).value.trim();
            if(pVal) prays[s.name] = pVal;
        });
        document.getElementById('loading-txt').classList.remove('hidden');
        fetch(API_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ 
                date: dVal, selectedClass: currentTeacher, 
                presentCount: present.length, presentStudents: present, 
                absentStudents: absent, absentReasons: reasons, prayRequests: prays
            })
        })
        .then(() => {
            document.getElementById('loading-txt').classList.add('hidden');
            alert(`🎉 [${currentTeacher} 쌤] 반 저장 완료!`);
            loadData();
        })
        .catch(() => {
            document.getElementById('loading-txt').classList.add('hidden');
            alert("저장 오류!");
        });
    }
</script>
</body>
</html>
